# Auto-generated by @suite/generator. Do not edit. (Story 4.2, FR14)
# PR gate: build + credential-free stdio smoke test. Deliberately NO typecheck
# step — the retired legacy CI died on `tsc --noEmit` against known generated-
# client type noise and nobody watched it; tsup (esbuild) is the build truth.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    name: Build + stdio smoke (Node 22)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # npm ci needs a lockfile in sync with package.json — but the lockfile is
      # DISTRIBUTION-owned (Phase B): a first propagation has none, and a
      # dependency-changing propagation runs against the stale preserved lock.
      # The gate's job is build + smoke, not lockfile lifecycle (review P1) —
      # fall back VISIBLY instead of rejecting correct propagations.
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] && npm ci; then
            echo "dependencies installed via npm ci"
          else
            echo "::warning::npm ci unavailable or lockfile out of sync — falling back to npm install (expected on propagation PRs until Phase B refreshes the lockfile)"
            npm install --no-audit --no-fund
          fi

      - name: Build
        run: npm run build

      - name: Smoke test (initialize + tools/list, no credentials)
        run: node scripts/ci-smoke.mjs
